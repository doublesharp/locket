"$schema" = "../gen/schemas/desktop-schema.json"

[[permission]]
identifier = "desktop-commands"
description = "Allows the Locket webview to invoke the metadata-scoped desktop commands registered by this crate."
commands.allow = [
  "agent_status",
  "agent_lock",
  "agent_reveal",
  "agent_copy",
  "agent_scan",
  "agent_resolve",
  "agent_prepare_exec",
  "agent_list_runtime_sessions",
  "agent_list_secrets",
  "agent_read_config",
  "agent_write_config",
  "agent_list_audit",
  "agent_list_audit",
  "agent_verify_audit",
  "tray_set_state",
]
commands.deny = []
