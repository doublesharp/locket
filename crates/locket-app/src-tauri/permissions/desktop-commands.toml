"$schema" = "../gen/schemas/desktop-schema.json"

[[permission]]
identifier = "desktop-commands"
description = "Allows the Locket webview to invoke the metadata-scoped desktop commands registered by this crate."
commands.allow = [
  "agent_status",
  "agent_subscribe_status",
  "agent_lock",
  "agent_unlock",
  "agent_set_active_profile",
  "agent_reveal",
  "agent_copy",
  "agent_scan",
  "agent_resolve",
  "agent_prepare_exec",
  "agent_policy_doctor",
  "agent_export_bundle",
  "agent_import_bundle",
  "agent_verify_bundle",
  "agent_recovery_rotate",
  "agent_list_runtime_sessions",
  "agent_list_policies",
  "agent_register_command_policies",
  "agent_list_device_members",
  "agent_list_secrets",
  "agent_set_secret",
  "agent_rotate_secret",
  "agent_read_config",
  "agent_write_config",
  "agent_list_audit",
  "agent_verify_audit",
  "agent_list_versions",
  "agent_copy_secret",
  "tray_set_state",
  "tray_set_selection",
  "tray_set_privacy_context",
]
commands.deny = []
