[profile.default]
retries = 0
failure-output = "immediate-final"
status-level = "fail"
final-status-level = "slow"
slow-timeout = { period = "30s", terminate-after = 2 }

[profile.ci]
retries = 0
failure-output = "immediate-final"
status-level = "all"
final-status-level = "all"
slow-timeout = { period = "30s", terminate-after = 2 }
